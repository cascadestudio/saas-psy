name: Deploy API to Dedibox

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/core/**'
      - 'package-lock.json'
      - '.github/workflows/deploy-api.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t melya-api -f apps/api/Dockerfile .

      - name: Save Docker image
        run: docker save melya-api | gzip > melya-api.tar.gz

      - name: Copy image to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: melya-api.tar.gz
          target: /home/cascade

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            # Load image
            docker load < /home/cascade/melya-api.tar.gz

            # Stop old container
            docker stop melya-api-prod 2>/dev/null || true
            docker rm melya-api-prod 2>/dev/null || true

            # Run migrations with admin user (DDL privileges)
            docker run --rm \
              --network host \
              -e DATABASE_URL="${{ secrets.DATABASE_URL_MIGRATE }}" \
              melya-api npx prisma migrate deploy

            # Run new container with app user (DML only)
            docker run -d \
              --name melya-api-prod \
              --restart unless-stopped \
              --network host \
              -e DATABASE_URL="${{ secrets.DATABASE_URL_PROD }}" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET_PROD }}" \
              -e ENCRYPTION_KEY="${{ secrets.ENCRYPTION_KEY_PROD }}" \
              -e NODE_ENV=production \
              -e PORT=3002 \
              -e CORS_ORIGIN="https://melya.app,https://www.melya.app" \
              melya-api

            # Cleanup
            rm /home/cascade/melya-api.tar.gz
            docker image prune -f

            # Verify
            sleep 5
            curl -f http://localhost:3002/api/health || exit 1
