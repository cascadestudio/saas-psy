name: Deploy API to Dedibox (Staging)

on:
  push:
    branches: [staging]
    paths:
      - 'apps/api/**'
      - 'packages/core/**'
      - 'package-lock.json'
      - '.github/workflows/deploy-api-staging.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t melya-api-staging -f apps/api/Dockerfile .

      - name: Save Docker image
        run: docker save melya-api-staging | gzip > melya-api-staging.tar.gz

      - name: Copy image to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: melya-api-staging.tar.gz
          target: /home/cascade

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            # Load image
            docker load < /home/cascade/melya-api-staging.tar.gz

            # Stop old container
            docker stop melya-api-staging 2>/dev/null || true
            docker rm melya-api-staging 2>/dev/null || true

            # Run migrations with admin user (DDL privileges)
            docker run --rm \
              --network host \
              -e DATABASE_URL="${{ secrets.DATABASE_URL_STAGING_MIGRATE }}" \
              melya-api-staging npx prisma migrate deploy

            # Run new container with app user (DML only)
            docker run -d \
              --name melya-api-staging \
              --restart unless-stopped \
              --network host \
              -e DATABASE_URL="${{ secrets.DATABASE_URL_STAGING }}" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET_STAGING }}" \
              -e ENCRYPTION_KEY="${{ secrets.ENCRYPTION_KEY_STAGING }}" \
              -e RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}" \
              -e NODE_ENV=staging \
              -e PORT=3001 \
              -e CORS_ORIGIN="https://staging.melya.app,https://staging-melya.vercel.app,http://localhost:3000" \
              -e APP_URL="https://staging.melya.app" \
              melya-api-staging

            # Cleanup
            rm /home/cascade/melya-api-staging.tar.gz || true
            docker image prune -f

            # Verify
            sleep 5
            curl -f http://localhost:3001/api/health || exit 1
