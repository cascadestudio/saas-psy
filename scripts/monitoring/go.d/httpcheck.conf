# Netdata HTTP check for Melya API
# Location: /etc/netdata/go.d/httpcheck.conf

jobs:
  - name: melya_api_prod
    url: http://localhost:3002/api/health
    status_accepted:
      - 200
    response_match: '"status":"ok"'
    timeout: 5
    update_every: 30

  - name: melya_api_staging
    url: http://localhost:3001/api/health
    status_accepted:
      - 200
    response_match: '"status":"ok"'
    timeout: 5
    update_every: 60
