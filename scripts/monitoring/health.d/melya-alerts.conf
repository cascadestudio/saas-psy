# ============================================================================
# Melya custom alerts for Dedibox HDS server
# Location: /etc/netdata/health.d/melya-alerts.conf
# ============================================================================

# ---------------------------------------------------------------------------
# Disk space alerts
# ---------------------------------------------------------------------------

 alarm: disk_space_warning
    on: disk.space
    os: linux
lookup: min -1m unaligned of avail
 units: GiB
 every: 1m
  warn: $this < 20
  crit: $this < 10
 delay: up 1m down 15m multiplier 1.5 max 1h
  info: available disk space is critically low
    to: sysadmin

# Disk space percentage
 alarm: disk_space_pct_warning
    on: disk.space
    os: linux
  calc: $used * 100 / ($avail + $used)
 units: %
 every: 1m
  warn: $this > 80
  crit: $this > 90
 delay: up 1m down 15m multiplier 1.5 max 1h
  info: disk usage is above threshold
    to: sysadmin

# ---------------------------------------------------------------------------
# RAM alerts
# ---------------------------------------------------------------------------

 alarm: ram_usage_warning
    on: system.ram
    os: linux
  calc: ($used) * 100 / ($used + $cached + $free + $buffers)
 units: %
 every: 1m
  warn: $this > 85
  crit: $this > 95
 delay: up 5m down 15m multiplier 1.5 max 1h
  info: system RAM usage is high
    to: sysadmin

# ---------------------------------------------------------------------------
# CPU alerts
# ---------------------------------------------------------------------------

 alarm: cpu_usage_warning
    on: system.cpu
    os: linux
lookup: average -5m unaligned of user,system,softirq,irq
 units: %
 every: 1m
  warn: $this > 85
  crit: $this > 95
 delay: up 5m down 15m multiplier 1.5 max 1h
  info: average CPU utilization over the last 5 minutes is high
    to: sysadmin

# CPU sustained high usage (15 min average)
 alarm: cpu_sustained_high
    on: system.cpu
    os: linux
lookup: average -15m unaligned of user,system,softirq,irq
 units: %
 every: 5m
  warn: $this > 75
  crit: $this > 90
 delay: up 15m down 30m multiplier 1.5 max 2h
  info: sustained high CPU usage over 15 minutes
    to: sysadmin

# ---------------------------------------------------------------------------
# Docker container alerts
# ---------------------------------------------------------------------------

# Alert if melya-api-prod container is not running
# Netdata monitors docker containers via cgroups - if the container stops,
# the cgroup disappears and metrics stop. We use a httpcheck instead.

 alarm: melya_api_prod_health
    on: httpcheck_melya_api_prod.responsetime
    os: linux
lookup: average -1m unaligned
 units: ms
 every: 30s
  warn: $this > 2000
  crit: $this > 5000
 delay: up 1m down 5m multiplier 1.5 max 30m
  info: Melya API prod response time is high
    to: sysadmin

 alarm: melya_api_prod_down
    on: httpcheck_melya_api_prod.status
    os: linux
lookup: min -1m unaligned
 every: 30s
  crit: $this == 0
 delay: up 30s down 5m multiplier 1.5 max 30m
  info: Melya API prod health check is failing
    to: sysadmin

# ---------------------------------------------------------------------------
# PostgreSQL alerts
# ---------------------------------------------------------------------------

 alarm: postgres_connections_high
    on: postgres_melya_prod.connections_utilization
    os: linux
  calc: $used
 units: %
 every: 1m
  warn: $this > 70
  crit: $this > 90
 delay: up 2m down 10m multiplier 1.5 max 1h
  info: PostgreSQL connection utilization is high
    to: sysadmin

 alarm: postgres_dead_tuples
    on: postgres_melya_prod.database_dead_tuples
    os: linux
lookup: average -5m unaligned
 every: 5m
  warn: $this > 100000
  info: high number of dead tuples - consider running VACUUM
    to: sysadmin
